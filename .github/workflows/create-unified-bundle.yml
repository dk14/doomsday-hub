name: Create Unified Bundle

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [repo_updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout doomsday-hub to root
        uses: actions/checkout@v4

      - name: Checkout crypto repo
        uses: actions/checkout@v4
        with:
          repository: dk14/crypto
          path: bundle/crypto

      - name: Checkout q repo
        uses: actions/checkout@v4
        with:
          repository: dk14/q
          path: bundle/q

      - name: Checkout warriors repo
        uses: actions/checkout@v4
        with:
          repository: dk14/warriors
          path: bundle/warriors

      - name: Checkout doomsday-website repo
        uses: actions/checkout@v4
        with:
          repository: dk14/doomsday-website
          path: bundle/doomsday-website

      - name: Checkout mega-peers repo
        uses: actions/checkout@v4
        with:
          repository: dk14/mega-peers
          path: bundle/mega-peers

      - name: Create unified zip archive (full)
        run: |
          cd bundle
          zip -r ../doomsday-unified-bundle.zip . -x "*/.*" "*/node_modules/*" "*/__pycache__/*" "*/dist/*" "*/build/*" "*.mp4"
          cd ..
          ls -lh doomsday-unified-bundle.zip

      - name: Create minified zip archive (no media)
        run: |
          cd bundle
          zip -r ../doomsday-unified-bundle-minified.zip . -x "*/.*" "*/node_modules/*" "*/__pycache__/*" "*/dist/*" "*/build/*" "*.mp4" "*.mp3" "*.wav" "*.png" "*.jpg" "*.jpeg" "*.gif" "*.webp" "*.svg" "*.ico"
          cd ..
          ls -lh doomsday-unified-bundle-minified.zip

      - name: Create releases folder and copy zips
        run: |
          mkdir -p releases
          cp doomsday-unified-bundle.zip releases/
          cp doomsday-unified-bundle-minified.zip releases/

      - name: Commit and push zips to repository
        run: |
          git config user.email "dk14@github.com"
          git config user.name "dk14"
          git add releases/doomsday-unified-bundle.zip releases/doomsday-unified-bundle-minified.zip
          git diff-index --quiet HEAD || git commit -m "Update unified bundles - $(date +%Y-%m-%d\ %H:%M:%S)"
          git push
